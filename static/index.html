<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Medical Text Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                <span>MedAnalyzer</span>
            </div>
            <nav>
                <button class="nav-item active" id="nav-analyze">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    New Analysis
                </button>
                <button class="nav-item" id="nav-history">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    History Log
                </button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header>
                <h1>Smart Medical Text Analyzer</h1>
                <p>AI-powered extraction of structured data from physician notes.</p>
            </header>

            <!-- Analyze View -->
            <section id="view-analyze" class="view-section active">
                <div class="layout-grid">
                    <!-- Left Column: Input -->
                    <div class="card input-card">
                        <h2>Raw Notes</h2>
                        <textarea id="notes-input" placeholder="Paste physician notes here... (e.g., 'Patient is a 45 y/o male with a 3 day history of severe headache. Prescribed Ibuprofen 400mg every 6 hours.')"></textarea>
                        <button id="analyze-btn" class="primary-btn">
                            <span class="btn-text">Extract Data</span>
                            <div class="loader" id="btn-loader"></div>
                        </button>
                    </div>

                    <!-- Right Column: Results -->
                    <div class="card result-card" id="result-container">
                        <div class="empty-state" id="empty-state">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="feather feather-activity"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                            <p>Enter notes and click analyze to see structured results here.</p>
                        </div>
                        
                        <div class="result-content hidden" id="result-content">
                            <div class="patient-demographics">
                                <div class="demo-badge">
                                    <span class="label">Age</span>
                                    <span class="value" id="res-age">-</span>
                                </div>
                                <div class="demo-badge">
                                    <span class="label">Gender</span>
                                    <span class="value" id="res-gender">-</span>
                                </div>
                            </div>

                            <div class="result-section">
                                <h3>Symptoms</h3>
                                <div class="tags-container" id="res-symptoms"></div>
                            </div>

                            <div class="result-section">
                                <h3>Medications</h3>
                                <div class="table-container">
                                    <table id="res-medications">
                                        <thead>
                                            <tr>
                                                <th>Name</th>
                                                <th>Dosage</th>
                                                <th>Frequency</th>
                                                <th>Duration</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <!-- Dynamically populated -->
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="result-section">
                                <h3>Advice</h3>
                                <div class="advice-box" id="res-advice"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- History View -->
            <section id="view-history" class="view-section">
                <div class="card history-card">
                    <h2>Past Analyses</h2>
                    <button id="refresh-history-btn" class="secondary-btn">Refresh</button>
                    <div class="history-list" id="history-list">
                        <!-- Dynamically populated -->
                        <div class="loader-centered hidden" id="history-loader"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Message</div>

    <script src="/static/script.js"></script>
</body>
</html>
